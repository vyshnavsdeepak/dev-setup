"$schema" = 'https://starship.rs/config-schema.json'

# ================================================================
# INDUSTRIAL MINIMAL
# Inspired by: user@host path % — the classic unix prompt
# One accent (#cc7832). No icons. No noise.
# ================================================================

format = """
$username\
[@](fg:#606060)\
$hostname \
$directory\
$git_branch\
$git_status\
$cmd_duration\
$line_break\
$character"""

add_newline = true

# --- identity
[username]
show_always = true
format = '[$user]($style)'
style_user = '#cc7832 bold'
style_root = 'bold red'

[hostname]
ssh_only = false
format = '[$ssh_symbol$hostname]($style)'
style = '#cc7832 bold'
trim_at = '.'

# --- location
[directory]
format = '[$path]($style) '
style = '#e0e0e0 bold'
truncation_length = 3
truncate_to_repo = false
read_only = ' ro'
read_only_style = '#606060'

# --- branch: secondary, recedes
[git_branch]
symbol = ''
format = '[-- $branch]($style) '
style = '#808080'
truncation_length = 30

# --- dirty: accent color draws eye to what needs action
[git_status]
format = '[$all_status$ahead_behind]($style)'
style = 'bold #cc7832'
ahead = '+${count} '
behind = '-${count} '
diverged = '+${ahead_count} -${behind_count} '
conflicted = 'conflict '
untracked = 'untracked '
stashed = 'stash:${count} '
modified = 'modified '
staged = 'staged '
renamed = 'renamed '
deleted = 'deleted '

# --- duration: only when > 2s
[cmd_duration]
min_time = 2_000
format = '[-- ${duration}]($style) '
style = '#606060'

# --- prompt character: % like classic zsh
[character]
success_symbol = '[%](#808080 bold)'
error_symbol = '[%](#a04040 bold)'
vimcmd_symbol = '[%](#cc7832 bold)'

[line_break]
disabled = false

# --- off
[aws]
disabled = true
[azure]
disabled = true
[gcloud]
disabled = true
[kubernetes]
disabled = true
[terraform]
disabled = true
[package]
disabled = true
