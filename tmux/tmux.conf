# ================================================================
# INDUSTRIAL MINIMAL — tmux
# ================================================================

# ── General ──────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on
set -sg escape-time 0
set -g focus-events on

# ── Prefix ──────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Keybindings ─────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "reloaded"

# Splits
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Vi mode for copy
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# ── Status bar ──────────────────────────────────────
# Bottom bar: dark, minimal, functional
set -g status-position bottom
set -g status-style "bg=#191919,fg=#606060"
set -g status-interval 5

# Left: session name
set -g status-left "#[fg=#cc7832,bold] #S #[fg=#333333]| "
set -g status-left-length 20

# Right: date and time — control panel clock
set -g status-right "#[fg=#606060]%H:%M "

# Window list: current window gets the accent
set -g window-status-format "#[fg=#606060] #I:#W "
set -g window-status-current-format "#[fg=#e0e0e0,bold] #I:#W "
set -g window-status-separator "#[fg=#333333]|"

# Pane borders: barely visible unless active
set -g pane-border-style "fg=#333333"
set -g pane-active-border-style "fg=#cc7832"

# Message style
set -g message-style "bg=#191919,fg=#cc7832"

# ── Plugins ─────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Resurrect & Continuum
set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'

# ── Initialize TPM (keep at bottom) ────────────────
run '~/.tmux/plugins/tpm/tpm'
